# Masaveu Tech legacy URL redirects
# Date: 2026-03-09
#
# Copy these rules inside the HTTPS server block for masaveutech.com,
# before generic `try_files` handling.

# WordPress sitemap legacy endpoints
location = /wp-sitemap.xml {
    return 301 https://masaveutech.com/sitemap.xml;
}

location = /sitemap_index.xml {
    return 301 https://masaveutech.com/sitemap.xml;
}

# Canonical duplicates that should redirect to the preferred URL
location = /index.html {
    return 301 https://masaveutech.com/;
}

location = /es/index.html {
    return 301 https://masaveutech.com/es/;
}

# Legacy English section moved to root
location = /en {
    return 301 https://masaveutech.com/;
}

location = /en/ {
    return 301 https://masaveutech.com/;
}

location ~* ^/en/.+ {
    return 301 https://masaveutech.com/;
}

# Legacy Spanish pages now consolidated in /es/
location ~* ^/(nuestro-fundador|servicios-masaveu-tech|masaveu-tech-nuestro-enfoque|blog|contacto|aviso-legal|politica-de-privacidad|politica-de-cookies|declaracion-de-accesibilidad)/?$ {
    return 301 https://masaveutech.com/es/;
}

# Old deploy artifacts that should not be indexed
location ^~ /assets/ {
    return 410;
}

location = /masaveutech.com.zip {
    return 410;
}

# Optional: use custom 404 page for unknown URLs
# error_page 404 /404.html;
