name: Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate critical files
        run: |
          test -f index.html
          test -f es/index.html
          test -f robots.txt
          test -f sitemap.xml

      - name: Load SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PASSPHRASE: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
        run: |
          if [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "DEPLOY_SSH_PRIVATE_KEY is empty."
            exit 1
          fi

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$DEPLOY_SSH_PASSPHRASE" ]; then
            printf '%s\n' '#!/usr/bin/env sh' 'printf '\''%s\n'\'' "$DEPLOY_SSH_PASSPHRASE"' > ~/.ssh/askpass.sh
            chmod 700 ~/.ssh/askpass.sh
            DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh SSH_ASKPASS_REQUIRE=force setsid ssh-add ~/.ssh/deploy_key < /dev/null
            rm -f ~/.ssh/askpass.sh
          else
            if ! ssh-add ~/.ssh/deploy_key; then
              echo "SSH key could not be loaded without passphrase."
              echo "Set DEPLOY_SSH_PASSPHRASE or use a deploy key without passphrase."
              exit 1
            fi
          fi

          ssh-add -l

      - name: Add server host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy files with rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz \
            --exclude-from=".deployignore" \
            -e "ssh -p $DEPLOY_PORT" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Remove stale non-public artifacts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEST_PATH="${DEPLOY_PATH%/}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf \"$DEST_PATH/assets\" \"$DEST_PATH/masaveutech.com.zip\""

      - name: Basic smoke checks
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL repo variable is not configured; skipping smoke checks."
            exit 0
          fi
          site="${SITE_URL%/}"
          curl -fsSI "$site/" >/dev/null
          curl -fsSI "$site/es/" >/dev/null
          curl -fsSI "$site/robots.txt" >/dev/null
          curl -fsSI "$site/sitemap.xml" >/dev/null

          test "$(curl -s -o /dev/null -w "%{http_code}" "$site/index.html")" = "301"
          test "$(curl -s -o /dev/null -w "%{http_code}" "$site/es/index.html")" = "301"

          assets_status="$(curl -s -o /dev/null -w "%{http_code}" "$site/assets/index.html")"
          test "$assets_status" = "404" || test "$assets_status" = "410"

          zip_status="$(curl -s -o /dev/null -w "%{http_code}" "$site/masaveutech.com.zip")"
          test "$zip_status" = "404" || test "$zip_status" = "410"
